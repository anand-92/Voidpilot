commands:
  install: uv sync && npm --prefix frontend install
  typecheck: uv run mypy src/
  build: npm --prefix frontend run build
  test: uv run pytest tests/ -v
  lint: uv run ruff check src/ && npm --prefix frontend run lint
  frontend-build: npm --prefix frontend run build
  frontend-lint: npm --prefix frontend run lint
  backend-test-walkthrough: uv run pytest tests/test_walkthrough.py -v
  backend-test-transcripts: uv run pytest tests/test_gemini_audio_sanitization.py -v

services:
  api:
    start: uv run uvicorn src.app.main:app --host 127.0.0.1 --port 8000
    stop: pids=$(lsof -ti :8000); [ -z "$pids" ] || kill $pids
    healthcheck: curl -sf http://127.0.0.1:8000/health
    port: 8000
    depends_on: []

  web:
    start: npm --prefix frontend run dev -- --host 127.0.0.1 --port 5173 --clearScreen false
    stop: pids=$(lsof -ti :5173); [ -z "$pids" ] || kill $pids
    healthcheck: curl -sf http://127.0.0.1:5173
    port: 5173
    depends_on: [api]
