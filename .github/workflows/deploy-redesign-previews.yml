name: Deploy Redesign Previews

on:
  workflow_dispatch:
  push:
    branches:
      - redesign/magicui
      - redesign/motion-primitives
      - redesign/cult-ui

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      REGION: us-east1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive service name from branch
        id: meta
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          SUFFIX="${BRANCH#redesign/}"
          SUFFIX=$(echo "$SUFFIX" | tr '/' '-' | tr '[:upper:]' '[:lower:]')
          SERVICE="voidpilot-${SUFFIX}"
          IMAGE="gcr.io/${{ secrets.GCP_PROJECT_ID }}/${SERVICE}"
          echo "service=${SERVICE}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "Deploying branch '${BRANCH}' as service '${SERVICE}'"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker auth for GCR
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Build image
        run: docker build -t ${{ steps.meta.outputs.image }} .

      - name: Push image
        run: docker push ${{ steps.meta.outputs.image }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ steps.meta.outputs.service }} \
            --image ${{ steps.meta.outputs.image }} \
            --platform managed \
            --region ${REGION} \
            --allow-unauthenticated \
            --set-env-vars GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }},FIREBASE_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }},FIREBASE_STORAGE_BUCKET=${{ secrets.GCP_PROJECT_ID }}.firebasestorage.app

      - name: Print service URL
        run: |
          URL=$(gcloud run services describe ${{ steps.meta.outputs.service }} \
            --region ${REGION} --format 'value(status.url)')
          echo "## Deployed: ${URL}" >> "$GITHUB_STEP_SUMMARY"
          echo "Service: ${{ steps.meta.outputs.service }}"
          echo "URL: ${URL}"
