name: Junie

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  junie:
    if: |
      (github.event_name == 'issue_comment' && (
        contains(github.event.comment.body, '@junie-agent') ||
        contains(github.event.comment.body, '@Junie-Agent') ||
        contains(github.event.comment.body, '@junie') ||
        contains(github.event.comment.body, '@Junie')
      )) ||
      (github.event_name == 'pull_request_review_comment' && (
        contains(github.event.comment.body, '@junie-agent') ||
        contains(github.event.comment.body, '@Junie-Agent') ||
        contains(github.event.comment.body, '@junie') ||
        contains(github.event.comment.body, '@Junie')
      )) ||
      (github.event_name == 'pull_request_review' && (
        contains(github.event.review.body, '@junie-agent') ||
        contains(github.event.review.body, '@Junie-Agent') ||
        contains(github.event.review.body, '@junie') ||
        contains(github.event.review.body, '@Junie')
      )) ||
      (github.event_name == 'issues' && (
        contains(github.event.issue.body, '@junie-agent') ||
        contains(github.event.issue.body, '@Junie-Agent') ||
        contains(github.event.issue.body, '@junie') ||
        contains(github.event.issue.body, '@Junie') ||
        contains(github.event.issue.title, '@junie-agent') ||
        contains(github.event.issue.title, '@Junie-Agent') ||
        contains(github.event.issue.title, '@junie') ||
        contains(github.event.issue.title, '@Junie')
      ))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Junie
        id: junie
        uses: JetBrains/junie-github-action@main
        with:
          junie_api_key: ${{ secrets.JUNIE_API_KEY }}
          use_single_comment: true
          # model: "claude-opus-4-5-20251101"  # Optional: specify which model to use
